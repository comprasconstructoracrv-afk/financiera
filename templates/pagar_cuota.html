<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar pago</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 30px;
        }
        .contenedor {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button, a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        button {
            background: #28a745;
            color: white;
        }
        a {
            background: #6c757d;
            color: white;
            margin-left: 10px;
        }
        .dato {
            margin-bottom: 10px;
            font-size: 18px;
        }
        .rojo {
            color: red;
            font-weight: bold;
        }
    </style>
    <script>
        function mostrarOtroMedio() {
            const medio = document.getElementById("medio_pago").value;
            const otro = document.getElementById("otro_medio_box");
            otro.style.display = medio === "OTRO" ? "block" : "none";
        }
    </script>
</head>
<body>
    <div class="contenedor">
        <h1>Registrar pago</h1>

        <p class="dato"><strong>Cuota:</strong> {{ cuota.numero }}</p>
        <p class="dato"><strong>Valor cuota:</strong> {{ cuota.valor_cuota | cop }}</p>
        <p class="dato"><strong>Saldo pendiente:</strong> {{ cuota.saldo_pendiente | cop }}</p>
        <p class="dato rojo"><strong>Mora acumulada:</strong> {{ cuota.interes_mora | cop }}</p>
        <p class="dato rojo"><strong>Total a pagar hoy:</strong> {{ cuota.total_cobro | cop }}</p>

        <form method="POST">
            <label>Fecha de pago:</label>
            <input type="date" name="fecha_pago" required>

            <label>Valor a pagar:</label>
            <input type="number" name="valor" step="0.01" required>

            <label>Medio de pago:</label>
            <select name="medio_pago" id="medio_pago" onchange="mostrarOtroMedio()" required>
                <option value="">Seleccione</option>
                <option value="Bancolombia">Bancolombia</option>
                <option value="Efectivo">Efectivo</option>
                <option value="OTRO">Otro</option>
            </select>

            <div id="otro_medio_box" style="display:none;">
                <label>Escriba el otro medio de pago:</label>
                <input type="text" name="medio_pago_otro">
            </div>

            <button type="submit">Registrar pago</button>
            <a href="/ver_cuotas/{{ cuota.credito_id }}">Volver</a>
        </form>
    </div>
</body>
</html>
