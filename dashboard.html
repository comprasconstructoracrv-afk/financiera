<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Financiera</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 30px;
        }
        .contenedor {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        a {
            display: inline-block;
            margin: 8px;
            padding: 12px 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .salir {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Panel Principal</h1>
        <p>Bienvenido {{ user }} - Rol: {{ rol }}</p>

        <a href="/crear_credito">Crear crédito</a>
        <a href="/ver_creditos">Ver créditos</a>
        <a href="/logout" class="salir">Cerrar sesión</a>
    </div>
</body>
</html>
